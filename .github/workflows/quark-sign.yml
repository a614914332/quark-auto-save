name: Quark Daily Sign

on:
  workflow_dispatch:
  schedule:
    - cron: '20 0 * * *'

permissions:
  contents: read

concurrency:
  group: quark-daily-sign
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secret
        env:
          QUARK_COOKIE: ${{ secrets.QUARK_COOKIE }}
        run: |
          if [ -z "$QUARK_COOKIE" ]; then
            echo 'Missing repository secret: QUARK_COOKIE' >&2
            exit 1
          fi

      - name: Run Quark sign only
        env:
          QUARK_COOKIE: ${{ secrets.QUARK_COOKIE }}
          QUARK_SIGN_NOTIFY: 'true'
        run: python3 quark_auto_save.py .github/quark_sign_runtime.json

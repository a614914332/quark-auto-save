name: Quark Auto Signin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/quark-signin.yml
      - quark_auto_save.py
      - requirements.txt
      - tests/**
  schedule:
    # GitHub Actions uses UTC. This runs daily at 07:00 Asia/Shanghai.
    - cron: '0 23 * * *'

permissions:
  contents: read

concurrency:
  group: quark-auto-signin
  cancel-in-progress: false

jobs:
  signin:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signin self-tests
        run: python -m unittest tests/test_signin_params.py

      - name: Run quark signin
        env:
          QUARK_COOKIE: ${{ secrets.QUARK_COOKIE }}
          QUARK_SIGN_NOTIFY: ${{ vars.QUARK_SIGN_NOTIFY || 'true' }}
          QUARK_STRICT_SIGNIN: 'true'
        run: |
          if [ -z "$QUARK_COOKIE" ]; then
            echo '::error title=Invalid QUARK_COOKIE::QUARK_COOKIE secret is empty. Please add it in repository Secrets.' >&2
            exit 1
          fi
          rm -f quark_config.json
          python quark_auto_save.py
